<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photon Wallet - Approval Required</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header h1::before {
            content: '⚡';
            font-size: 24px;
        }

        .container {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .approval-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .approval-type {
            font-size: 14px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .domain-info {
            margin-bottom: 20px;
        }

        .domain-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
        }

        .domain-value {
            font-size: 16px;
            color: #fff;
            font-weight: 500;
            word-break: break-all;
        }

        .details-section {
            margin-top: 16px;
        }

        .details-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .detail-label {
            color: #aaa;
            font-size: 14px;
        }

        .detail-value {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            text-align: right;
            word-break: break-all;
            max-width: 60%;
        }

        .message-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            font-family: monospace;
            font-size: 13px;
            color: #e0e0e0;
            word-break: break-word;
            max-height: 150px;
            overflow-y: auto;
        }

        .warning-box {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            display: flex;
            gap: 10px;
        }

        .warning-icon {
            color: #ffc107;
            font-size: 20px;
            flex-shrink: 0;
        }

        .warning-text {
            color: #ffc107;
            font-size: 13px;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            gap: 12px;
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-approve {
            background: #f7931a;
            color: #ffffff;
            font-weight: 700;
        }

        .btn-approve:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(247, 147, 26, 0.4);
            filter: brightness(1.1);
        }

        .btn-reject {
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }

        .btn-reject:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ffd700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Photon Wallet</h1>
    </div>

    <div class="container" id="container">
        <div class="loading">
            <div class="spinner"></div>
            <div>Loading request...</div>
        </div>
    </div>

    <div class="actions" id="actions" style="display: none;">
        <button class="btn btn-reject" id="rejectBtn">Reject</button>
        <button class="btn btn-approve" id="approveBtn">Approve</button>
    </div>

    <script src="approval.js"></script>
</body>

</html>
