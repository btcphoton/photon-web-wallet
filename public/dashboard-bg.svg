<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- P2P Network Nodes -->
  <circle cx="50" cy="50" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="150" cy="30" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="250" cy="60" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="350" cy="40" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="100" cy="120" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="200" cy="150" r="3" fill="rgba(255,255,255,0.1)" />
  <circle cx="300" cy="130" r="3" fill="rgba(255,255,255,0.1)" />
  
  <!-- Connections -->
  <line x1="50" y1="50" x2="150" y2="30" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <line x1="150" y1="30" x2="250" y2="60" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <line x1="250" y1="60" x2="350" y2="40" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <line x1="50" y1="50" x2="100" y2="120" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <line x1="100" y1="120" x2="200" y2="150" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <line x1="200" y1="150" x2="300" y2="130" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <line x1="150" y1="30" x2="100" y2="120" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <line x1="250" y1="60" x2="200" y2="150" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  
  <!-- Stylized Lightning Bolt (Subtle) -->
  <path d="M280 20 L240 80 L260 80 L250 140 L290 80 L270 80 Z" fill="url(#grad1)" opacity="0.3" transform="rotate(-15 265 80)" />
  <path d="M120 60 L80 120 L100 120 L90 180 L130 120 L110 120 Z" fill="url(#grad1)" opacity="0.2" transform="rotate(10 105 120)" />

</svg>
